# Iceberg 1.11.0 runtime + AWS bundle are baked into the image ($SPARK_HOME/jars).
spark.sql.extensions                org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

spark.sql.catalog.iceberg           org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type      hive
spark.sql.catalog.iceberg.uri       thrift://hive-metastore:9083
spark.sql.catalog.iceberg.warehouse s3://warehouse/
spark.sql.catalog.iceberg.io-impl   org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.iceberg.s3.endpoint           http://minio:9000
spark.sql.catalog.iceberg.s3.path-style-access  true
spark.sql.defaultCatalog            iceberg

# Hadoop S3A: lets Spark's Hadoop FS resolve s3:// (e.g. remove_orphan_files listing).
spark.hadoop.fs.s3.impl                  org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.impl                 org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint             http://minio:9000
spark.hadoop.fs.s3a.access.key           admin
spark.hadoop.fs.s3a.secret.key           password123
spark.hadoop.fs.s3a.path.style.access    true
spark.hadoop.fs.s3a.connection.ssl.enabled false

# Standalone cluster (disabled — running in local[*] mode). To enable separate executors:
#   1) uncomment the lines below
#   2) docker compose --profile core --profile cluster up -d
#   3) recreate the Spark session in the notebook
# spark.master                 spark://spark-master:7077
# spark.driver.host            pyspark-notebook
# spark.executor.cores         1
# spark.executor.memory        1g
# spark.cores.max              2
