version: 2
updates:
  - package-ecosystem: pip
    directories:
      - "/"
      - "/src/features"
      - "/src/ingest"
      - "/src/ml"
      - "/src/seed"
      - "/src/ui"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
