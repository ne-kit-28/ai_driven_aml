# AML lakehouse — local dev stack (Hive Metastore catalog + Jupyter pyspark-notebook).
#   Core:      docker compose --profile core up -d
#   +Stream:   docker compose --profile core --profile streaming up -d
# Minimum host resources: ~10 GB RAM, 4 vCPU, 12 GB disk.
#
# Catalog = Hive Metastore (Postgres-backed). Iceberg table IO is done by the
# Spark/Trino clients via S3FileIO; the metastore itself needs s3a (hadoop-aws)
# only to create database dirs on MinIO — those jars are injected by jars-init.
# Tags pinned (supply-chain). MinIO community images discontinued -> last vetted tag.
name: aml-lakehouse

x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: admin
  AWS_SECRET_ACCESS_KEY: password123
  AWS_REGION: us-east-1

services:
  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    profiles: ["core"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    profiles: ["core"]
    depends_on:
      minio: {condition: service_healthy}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password123 &&
      mc mb -p local/warehouse &&
      echo 'bucket warehouse ready'"

  # Download metastore classpath jars (postgres JDBC + s3a) into a shared volume.
  jars-init:
    image: curlimages/curl:8.11.1
    profiles: ["core"]
    user: root                     # fresh named volume is root-owned; curl uid 100 can't write -> exit 23
    volumes: ["hive-aux:/aux"]
    entrypoint: >
      /bin/sh -c "
      set -e; cd /aux;
      M=https://repo1.maven.org/maven2;
      [ -f postgresql.jar ]      || curl -fsSLo postgresql.jar      $$M/org/postgresql/postgresql/42.7.4/postgresql-42.7.4.jar;
      [ -f hadoop-aws.jar ]      || curl -fsSLo hadoop-aws.jar      $$M/org/apache/hadoop/hadoop-aws/3.3.6/hadoop-aws-3.3.6.jar;
      [ -f aws-sdk-bundle.jar ]  || curl -fsSLo aws-sdk-bundle.jar  $$M/com/amazonaws/aws-java-sdk-bundle/1.12.367/aws-java-sdk-bundle-1.12.367.jar;
      echo 'metastore jars ready'"

  postgres:
    image: postgres:16.6
    profiles: ["core"]
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hivepw
    volumes: ["pg-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      timeout: 5s
      retries: 20

  hive-metastore:
    image: apache/hive:4.0.0   # NOT 4.0.1: it removed legacy thrift APIs that Iceberg's bundled Hive client still calls
    profiles: ["core"]
    depends_on:
      postgres: {condition: service_healthy}
      minio-init: {condition: service_completed_successfully}
      jars-init: {condition: service_completed_successfully}
    ports: ["9083:9083"]
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HIVE_AUX_JARS_PATH: /opt/hive/auxlib
      HIVE_CUSTOM_CONF_DIR: /hive_custom_conf   # without this the image ignores metastore-site.xml -> falls back to Derby
      # set IS_RESUME=true on re-runs (schema already initialised); unset on first boot
    volumes:
      - hive-aux:/opt/hive/auxlib
      - ./hive/metastore-site.xml:/hive_custom_conf/metastore-site.xml:ro
    command: ["--hiveconf", "hive.root.logger=INFO,console"]

  trino:
    image: trinodb/trino:475
    profiles: ["core"]
    depends_on:
      hive-metastore: {condition: service_started}
    ports: ["8080:8080"]
    volumes:
      - ./trino/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro

  pyspark-notebook:
    build: ./pyspark                       # Spark 3.5.8 + Iceberg 1.11.0 (jars baked in)
    image: aml/pyspark-notebook:3.5.8-iceberg1.11
    profiles: ["core"]
    depends_on:
      hive-metastore: {condition: service_started}
    ports: ["8888:8888", "4040:4040"]   # Jupyter / Spark UI
    environment:
      <<: *aws-env
    volumes:
      - ./spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ../src:/home/jovyan/work/src
      - ../data:/home/jovyan/work/data:ro

  # Spark Standalone cluster: notebook = driver (client mode), executors run on the worker.
  spark-master:
    image: aml/pyspark-notebook:3.5.8-iceberg1.11   # same baked image (Iceberg + S3A jars)
    profiles: ["cluster"]
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      <<: *aws-env
    ports: ["8081:8080", "7077:7077"]   # master UI (host 8081) ; master RPC

  spark-worker:
    image: aml/pyspark-notebook:3.5.8-iceberg1.11
    profiles: ["cluster"]
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on: [spark-master]
    environment:
      <<: *aws-env
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: "4g"
    ports: ["8082:8081"]   # worker UI (host 8082)

  # Seed/test service (one-shot) — fills MinIO/Iceberg with synthetic FEATURES_READY
  # data at the very start, standing in for Stage 2. Run before scoring.
  seed:
    build:
      context: ../src
      dockerfile: seed/Dockerfile
    image: aml/seed:latest
    profiles: ["seed"]
    # run AFTER `--profile core` is up (no depends_on: core services live in another profile)
    environment:
      PYICEBERG_CATALOG__DEFAULT__TYPE: hive
      PYICEBERG_CATALOG__DEFAULT__URI: thrift://hive-metastore:9083
      PYICEBERG_CATALOG__DEFAULT__WAREHOUSE: s3://warehouse/
      PYICEBERG_CATALOG__DEFAULT__S3__ENDPOINT: http://minio:9000
      PYICEBERG_CATALOG__DEFAULT__S3__ACCESS_KEY_ID: admin
      PYICEBERG_CATALOG__DEFAULT__S3__SECRET_ACCESS_KEY: password123
      AWS_REGION: us-east-1
      SEED_SCALE: "1.0"

  # Stage 2 — feature pipeline (one-shot): PENDING -> features -> FEATURES_READY.
  # Run after seed, before scoring.
  stage2:
    build:
      context: ../src
      dockerfile: features/Dockerfile
    image: aml/stage2:latest
    profiles: ["stage2"]
    environment:
      PYICEBERG_CATALOG__DEFAULT__TYPE: hive
      PYICEBERG_CATALOG__DEFAULT__URI: thrift://hive-metastore:9083
      PYICEBERG_CATALOG__DEFAULT__WAREHOUSE: s3://warehouse/
      PYICEBERG_CATALOG__DEFAULT__S3__ENDPOINT: http://minio:9000
      PYICEBERG_CATALOG__DEFAULT__S3__ACCESS_KEY_ID: admin
      PYICEBERG_CATALOG__DEFAULT__S3__SECRET_ACCESS_KEY: password123
      AWS_REGION: us-east-1
    volumes:
      - ../src/ml/artifacts:/artifacts:ro     # tgnlite_meta.json: fixed edge z-score stats

  # Graph scoring service (microservice) — reads FEATURES_READY, writes SCORED + toxicity.
  # Own profile: start it after the lake has data & tables (Stage 2 + scored/accounts tables).
  scoring:
    build: ../src/ml
    image: aml/scoring:latest
    profiles: ["scoring"]
    # run AFTER `--profile core` is up (no depends_on: core services live in another profile)
    environment:
      PYICEBERG_CATALOG__DEFAULT__TYPE: hive
      PYICEBERG_CATALOG__DEFAULT__URI: thrift://hive-metastore:9083
      PYICEBERG_CATALOG__DEFAULT__WAREHOUSE: s3://warehouse/
      PYICEBERG_CATALOG__DEFAULT__S3__ENDPOINT: http://minio:9000
      PYICEBERG_CATALOG__DEFAULT__S3__ACCESS_KEY_ID: admin
      PYICEBERG_CATALOG__DEFAULT__S3__SECRET_ACCESS_KEY: password123
      AWS_REGION: us-east-1
    volumes:
      - ../src/ml/artifacts:/artifacts:ro     # trained model (train_temporal.py output)
      - scoring-state:/state                   # bookmark / processed-offset

  # Compliance dashboard UI (microservice) — http://localhost:8501
  dashboard:
    build: ../src/ui
    image: aml/dashboard:latest
    profiles: ["core"]
    depends_on:
      trino: {condition: service_started}
    ports: ["8501:8501"]
    environment:
      # reads the lake via Trino (real pipeline). For offline/no-stack demo: DASH_SOURCE=parquet
      DASH_SOURCE: trino
      TRINO_HOST: trino
      DATA_DIR: /data
      KAFKA_BOOTSTRAP: kafka:9092      # publish blocks to the blocklist topic
    env_file:
      - path: ../.env          # LLM_API_KEY / LLM_BASE_URL / LLM_MODEL (see .env.example)
        required: false        # dashboard still runs without it (AI explain shows a hint)
    volumes:
      - ../data:/data:ro     # only used if DASH_SOURCE=parquet (offline fallback)

  # Continuous raw-transaction producer -> Kafka topic tx_raw
  producer:
    build:
      context: ../src
      dockerfile: ingest/Dockerfile
    image: aml/producer:latest
    profiles: ["streaming"]
    depends_on: [kafka]
    command: ["python", "producer.py", "--bootstrap", "kafka:9092", "--rate", "5", "--case-every", "45"]

  # Side test source: replay the IBM AML (AMLWorld) dataset into Kafka tx_raw.
  # Put the Kaggle CSVs in data/raw/ (mounted at /raw). Synthetic producer stays intact.
  ibm-replay:
    build:
      context: ../src
      dockerfile: ingest/Dockerfile
    image: aml/producer:latest
    profiles: ["ibm"]
    depends_on: [kafka]
    volumes:
      - ../data/raw:/raw:ro
    command: ["python", "ibm_replay.py", "--csv", "/raw/HI-Small_Trans.csv",
              "--patterns", "/raw/HI-Small_Patterns.txt", "--bootstrap", "kafka:9092", "--rate", "20"]

  kafka:
    image: apache/kafka:3.9.0
    profiles: ["streaming"]
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

volumes:
  minio-data:
  pg-data:
  hive-aux:
  scoring-state:
